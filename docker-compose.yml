services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: library-postgres
      POSTGRES_USER: library_dev_user
      POSTGRES_PASSWORD: library_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library_dev_user -d library-postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  setup:
    build:
      context: .
      dockerfile: setup/Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_DB: library-postgres
      POSTGRES_USER: library_dev_user
      POSTGRES_PASSWORD: library_dev_pass
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      SQL_URI: postgresql://library_dev_user:library_dev_pass@db:5432/library-postgres
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./setup/data:/app/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      POSTGRES_DB: library-postgres
      POSTGRES_USER: library_dev_user
      POSTGRES_PASSWORD: library_dev_pass
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      SQL_URI: postgresql://library_dev_user:library_dev_pass@db:5432/library-postgres
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"

volumes:
  postgres_data:
