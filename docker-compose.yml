services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: library-postgres
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user -d library-postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  setup:
    build:
      context: .
      dockerfile: setup/Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_DB: library-postgres
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_pass
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      SQL_URI: postgresql://etl_user:etl_pass@localhost:5432/library-postgres
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./setup/data:/app/data

volumes:
  postgres_data:
