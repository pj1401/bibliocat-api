stages:
  - build
  - test
  - release
  - deploy

default:
  artifacts:
    expire_in: 1h10min

# --- Build ---

build:
  stage: build
  tags:
    - patriciaj-rpi
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - echo "Building production images..."
    - docker compose -f docker-compose.prod.yml build
    - docker compose -f docker-compose.prod.yml push
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# --- Test ---

api_tests:
  stage: test
  tags:
    - patriciaj-rpi
  script:
    - echo "Building test images..."
    # --wait blocks until all healthchecks pass (including setup completing)
    - docker compose -p bibliocat-test -f docker-compose.test.yml up -d --build --wait

    - echo "Running API tests..."
    - apidog run ./tests/collection.apidog-cli.json -n 1 -r html,cli --out-dir ./apidog-reports/collection
    - apidog run ./tests/auth.apidog-cli.json -n 1 -r html,cli --out-dir ./apidog-reports/auth
    - apidog run ./tests/books.apidog-cli.json -n 1 -r html,cli --out-dir ./apidog-reports/books

  after_script:
    # Always runs, even if tests fail — -v removes the test volume
    - docker compose -p bibliocat-test -f docker-compose.test.yml down -v

  artifacts:
    when: always
    reports:
      junit: ./apidog-reports/*.xml
    paths:
      - ./apidog-reports/
    expire_in: 1h10min

  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"
    - if: $CI_COMMIT_BRANCH == "main"

# --- Deploy ---

deploy:
  stage: deploy
  tags:
    - patriciaj-rpi
  script:
    - echo "Deploying to production..."
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

    # Pull images from the container registry and restart the containers with the new images.
    - docker compose -f docker-compose.prod.yml pull
    - docker compose -f docker-compose.prod.yml up -d
  rules:
    - if: $CI_COMMIT_BRANCH == "main"  # Only run on main branch
