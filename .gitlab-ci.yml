stages:
  - build
  - test
  - release
  - deploy

default:
  artifacts:
    expire_in: 1h10min

# --- Build ---

.kaniko_auth: &kaniko_auth
  before_script:
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(printf "%s:%s" "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json

build-api:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  <<: *kaniko_auth
  script:
    - echo "Building API production image..."
    - /kaniko/executor
      --context $CI_PROJECT_DIR
      --dockerfile $CI_PROJECT_DIR/api/Dockerfile
      --destination $CI_REGISTRY_IMAGE/api:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

build-setup:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  <<: *kaniko_auth
  script:
    - echo "Building API setup production image..."
    - /kaniko/executor
      --context $CI_PROJECT_DIR
      --dockerfile $CI_PROJECT_DIR/setup/Dockerfile
      --destination $CI_REGISTRY_IMAGE/setup:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# --- Test ---

api_tests:
  stage: test
  tags:
    - patriciaj-rpi
  variables:
    PATH: "$CI_PROJECT_DIR/node_modules/.bin:$PATH"
  before_script:
    - npm install apidog-cli
  script:
    - echo "Building test images..."
    # --wait blocks until all healthchecks pass (including setup completing)
    - docker compose -p bibliocat-test -f docker-compose.test.yml up -d --build --wait

    - echo "Running API tests..."
    - apidog run ./tests/collection.apidog-cli.json -n 1 -r html,cli --out-dir ./apidog-reports/collection
    - apidog run ./tests/auth.apidog-cli.json -n 1 -r html,cli --out-dir ./apidog-reports/auth
    - apidog run ./tests/books.apidog-cli.json -n 1 -r html,cli --out-dir ./apidog-reports/books

  after_script:
    # Always runs, even if tests fail — -v removes the test volume
    - docker compose -p bibliocat-test -f docker-compose.test.yml down -v

  artifacts:
    when: always
    paths:
      - ./apidog-reports/
    expire_in: 1h10min

  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# --- Release ---

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/cli:latest
  script:
    - echo "Creating release $CI_COMMIT_TAG..."
  release:
    name: "Release $CI_COMMIT_TAG"
    tag_name: $CI_COMMIT_TAG
    description: "Release $CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG

# --- Deploy ---

deploy:
  stage: deploy
  tags:
    - patriciaj-rpi
  script:
    - echo "Deploying $CI_COMMIT_TAG to production..."
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

    # Pull images from the container registry and restart the containers with the new images.
    - docker compose -f docker-compose.prod.yml pull
    - docker compose -f docker-compose.prod.yml up -d
  rules:
    - if: $CI_COMMIT_TAG  # Deploy only after a new tag.
