image: docker:24

services:
  - docker:24-dind

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2
  DOCKER_BUILDKIT: 1

stages:
  - build
  - test
  - deploy
  - teardown

build-services:
  stage: build
  script:
    - docker compose build
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test-services:
  stage: test
  needs: ["build-services"]
  script:
    - docker compose up -d --wait
    # Wait for DB to be ready (using healthcheck)
    - docker compose exec -T db pg_isready -U library_dev_user -d library_postgres -h localhost
    # Check if API is responding
    - docker compose exec -T api curl -sSf http://localhost:5000/api/v1/ || exit 1
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test-job1:
  stage: test
  needs: ["test-services"]
  script:
    - echo "This job tests something"
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test-job2:
  stage: test
  needs: ["test-services"]
  script:
    - echo "This job tests something, but takes more time than test-job1."
    - sleep 20
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy-prod:
  stage: deploy
  needs: ["test-job1", "test-job2"]
  script:
    - echo "This job deploys something from the $CI_COMMIT_BRANCH branch."
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  environment: production

teardown:
  stage: teardown
  needs: ["test-services", "test-job1", "test-job2"]
  script:
    - docker compose down
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
