image: docker:24

services:
  - docker:24-dind

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2
  DOCKER_BUILDKIT: 1

stages:
  - test
  - deploy
  - teardown

test-services:
  stage: test
  before_script:
    - apk add ansible openssh-client wget envsubst
    - echo "$JWT_PRIVATE_KEY" | base64 -d > /tmp/jwt_private_key
    - chmod u=rwX,go-rwx /tmp/jwt_private_key
  script:
    - docker compose up -d --build --wait
    - docker compose exec -T api sh -c "export POSTGRES_USER=$POSTGRES_USER && export POSTGRES_PASSWORD=$POSTGRES_PASSWORD && export POSTGRES_DB=$POSTGRES_DB && pytest"
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test-job1:
  stage: test
  needs: ["test-services"]
  script:
    - echo "This job tests something"
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test-job2:
  stage: test
  needs: ["test-services"]
  script:
    - echo "This job tests something, but takes more time than test-job1."
    - sleep 20
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy-prod:
  stage: deploy
  needs: ["test-job1", "test-job2"]
  script:
    - echo "This job deploys something from the $CI_COMMIT_BRANCH branch."
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  environment: production

teardown:
  stage: teardown
  needs: ["test-services", "test-job1", "test-job2"]
  script:
    - docker compose down
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
