stages:
  - build
  - test
  - release
  - deploy

default:
  artifacts:
    expire_in: 1h10min

# --- Build ---

build-api:
  stage: build
  tags:
    - patriciaj-rpi
  script:
    - echo "Building API production image..."
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker compose -f docker-compose.prod.yml build api
    - docker compose -f docker-compose.prod.yml push api
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

build-setup:
  stage: build
  tags:
    - patriciaj-rpi
  script:
    - echo "Building setup production image..."
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker compose -f docker-compose.prod.yml build setup
    - docker compose -f docker-compose.prod.yml push setup
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# --- Test ---

unit_tests:
  stage: test
  image: python:3.12-slim
  script:
    - echo "Running unit tests..."
    - cd api
    - pip install uv
    - uv sync --group dev
    - uv run pytest
  artifacts:
    when: always
    paths:
      - api/test-reports/
    expire_in: 1h10min
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

api_tests:
  stage: test
  tags:
    - patriciaj-rpi
  script:
    - echo "Building test images..."
    # --wait blocks until all healthchecks pass (including setup completing)
    - docker compose -p bibliocat-test -f docker-compose.test.yml up -d --build --wait

    - echo "Running API tests..."
    - apidog run ./tests/collection.apidog-cli.json -n 1 -r html,cli --out-dir ./apidog-reports/collection
    - apidog run ./tests/auth.apidog-cli.json -n 1 -r html,cli --out-dir ./apidog-reports/auth
    - apidog run ./tests/books.apidog-cli.json -n 1 -r html,cli --out-dir ./apidog-reports/books
    - apidog run ./tests/authors.apidog-cli.json -n 1 -r html,cli --out-dir ./apidog-reports/authors
    - apidog run ./tests/reading-logs.apidog-cli.json -n 1 -r html,cli --out-dir ./apidog-reports/reading-logs

  after_script:
    # Always runs, even if tests fail — -v removes the test volume
    - docker compose -p bibliocat-test -f docker-compose.test.yml down -v

  artifacts:
    when: always
    paths:
      - ./apidog-reports/
    expire_in: 1h10min

  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# --- Release ---

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/cli:latest
  script:
    - echo "Creating release $CI_COMMIT_TAG..."
  release:
    name: "Release $CI_COMMIT_TAG"
    tag_name: $CI_COMMIT_TAG
    description: "Release $CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG

# --- Deploy ---

deploy:
  stage: deploy
  tags:
    - patriciaj-rpi
  script:
    - echo "Deploying $CI_COMMIT_TAG to production..."
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

    # Pull images from the container registry and restart the containers with the new images.
    - docker compose -f docker-compose.prod.yml pull
    - docker compose -f docker-compose.prod.yml up -d
  rules:
    - if: $CI_COMMIT_TAG  # Deploy only after a new tag.
