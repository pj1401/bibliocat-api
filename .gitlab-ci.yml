image: docker:stable

services:
  - name: docker:dind
    command: ["--tls=false"]

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""

stages:
  - test
  - deploy
  - teardown

test-services:
  stage: test
  script:
    - |
      for i in {1..10}; do
        if docker info > /dev/null 2>&1; then
          echo "Docker daemon is ready"
          break
        fi
        echo "Waiting for Docker daemon..."
        sleep 5
      done
    - docker compose build
    - docker compose up -d
    - docker compose exec -e POSTGRES_USER=$POSTGRES_USER -e POSTGRES_PASSWORD=$POSTGRES_PASSWORD -e POSTGRES_DB=$POSTGRES_DB db setup
    - docker compose down
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test-job1:
  stage: test
  needs: ["test-services"]
  script:
    - echo "This job tests something"
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test-job2:
  stage: test
  needs: ["test-services"]
  script:
    - echo "This job tests something, but takes more time than test-job1."
    - sleep 20
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy-prod:
  stage: deploy
  needs: ["test-job1", "test-job2"]
  script:
    - echo "This job deploys something from the $CI_COMMIT_BRANCH branch."
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  environment: production

teardown:
  stage: teardown
  needs: ["test-services", "test-job1", "test-job2"]
  script:
    - docker compose down
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH