name: CI/CD

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch: 

permissions:
  contents: read

env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}

jobs:

  # --- Lint ---

  lint:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: api
        run: uv sync --group dev

      - name: Run pyright
        working-directory: api
        run: uv run pyright

      - name: Run ruff
        working-directory: api
        run: |
          uv run ruff check src
          uv run ruff format --diff

  # --- Unit tests ---

  unit-tests:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: api
        run: uv sync --group dev

      - name: Run pytest
        working-directory: api
        run: uv run pytest

  # --- Build ---

  build-api:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref_type == 'tag')
    runs-on: self-hosted
    permissions:
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Build and push API image
        run: |
          docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
          docker compose -f docker-compose.prod.yml build api
          docker compose -f docker-compose.prod.yml push api

  build-setup:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref_type == 'tag')
    runs-on: self-hosted
    permissions:
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Build and push setup image
        run: |
          docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
          docker compose -f docker-compose.prod.yml build setup
          docker compose -f docker-compose.prod.yml push setup

  # --- API tests ---

  api-tests:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref_type == 'tag')
    needs: [build-api, build-setup]
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Build test images
        run: |
          docker logout ghcr.io
          docker compose -p bibliocat-test -f docker-compose.test.yml up -d --build --wait

      - name: Run API tests
        run: |
          apidog run ./tests/testing-env/collection.apidog-cli.json -n 1 -r html,cli --out-dir ./apidog-reports/collection
          apidog run ./tests/testing-env/auth.apidog-cli.json -n 1 -r html,cli --out-dir ./apidog-reports/auth
          apidog run ./tests/testing-env/books.apidog-cli.json -n 1 -r html,cli --out-dir ./apidog-reports/books
          apidog run ./tests/testing-env/authors.apidog-cli.json -n 1 -r html,cli --out-dir ./apidog-reports/authors
          apidog run ./tests/testing-env/reading-logs.apidog-cli.json -n 1 -r html,cli --out-dir ./apidog-reports/reading-logs

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: apidog-reports
          path: ./apidog-reports/
          retention-days: 1

      - name: Tear down test stack
        if: always()
        run: docker compose -p bibliocat-test -f docker-compose.test.yml down -v

  # --- Release ---

  release:
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: [lint, unit-tests, api-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Create release
        uses: softprops/action-gh-release@v3

  # --- Deploy ---

  deploy:
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: [release]
    runs-on: self-hosted
    environment:
      name: production
      url: https://patriciaj.se/bibliocat-api/
    permissions:
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Pull images and restart containers
        run: |
          docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d

  redeploy:
    if: github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    environment:
      name: production
      url: https://patriciaj.se/bibliocat-api/
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v7
  
      - name: Pull images and restart containers
        run: |
          docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d
