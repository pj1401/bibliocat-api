name: CI/CD

on:
  push:
  pull_request:
    branches:
      - main
  release:
    types: [created]

permissions:
  contents: read

env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}

jobs:

  # --- Lint ---

  lint:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: api
        run: uv sync --group dev

      - name: Run pyright
        working-directory: api
        run: uv run pyright

      - name: Run ruff
        working-directory: api
        run: uv run ruff check src

  # --- Unit tests ---

  unit-tests:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: api
        run: uv sync --group dev

      - name: Run pytest
        working-directory: api
        run: uv run pytest

  # --- Build ---

  build-api:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref_type == 'tag')
    runs-on: self-hosted
    permissions:
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and push API image
        run: |
          docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
          docker compose -f docker-compose.prod.yml build api
          docker compose -f docker-compose.prod.yml push api
    env:
      REGISTRY_IMAGE: $REGISTRY_IMAGE

  build-setup:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref_type == 'tag')
    runs-on: self-hosted
    permissions:
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and push setup image
        run: |
          docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
          docker compose -f docker-compose.prod.yml build setup
          docker compose -f docker-compose.prod.yml push setup
    env:
      REGISTRY_IMAGE: $REGISTRY_IMAGE

  # --- API tests ---

  api-tests:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref_type == 'tag')
    needs: [build-api, build-setup]
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build test images
        run: docker compose -p bibliocat-test -f docker-compose.test.yml up -d --build --wait

      - name: Run API tests
        run: |
          apidog run ./tests/collection.apidog-cli.json -n 1 -r html,cli --out-dir ./apidog-reports/collection
          apidog run ./tests/auth.apidog-cli.json -n 1 -r html,cli --out-dir ./apidog-reports/auth
          apidog run ./tests/books.apidog-cli.json -n 1 -r html,cli --out-dir ./apidog-reports/books
          apidog run ./tests/authors.apidog-cli.json -n 1 -r html,cli --out-dir ./apidog-reports/authors
          apidog run ./tests/reading-logs.apidog-cli.json -n 1 -r html,cli --out-dir ./apidog-reports/reading-logs

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apidog-reports
          path: ./apidog-reports/
          retention-days: 1

      - name: Tear down test stack
        if: always()
        run: docker compose -p bibliocat-test -f docker-compose.test.yml down -v

  # --- Release ---

  release:
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: [lint, unit-tests, api-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v3

  # --- Deploy ---

  deploy:
    if: github.event_name == 'release'
    runs-on: self-hosted
    permissions:
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull images and restart containers
        run: |
          docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d
    env:
      REGISTRY_IMAGE: $REGISTRY_IMAGE
