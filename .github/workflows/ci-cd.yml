name: CI/CD

on:
  push:
  pull_request:
    branches:
      - main
  release:
    types: [created]

permissions:
  contents: read

jobs:
  lint:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        working-directory: api
        run: uv sync --group dev
      - name: Run pyright
        working-directory: api
        run: uv run pyright
      - name: Run ruff
        working-directory: api
        run: uv run ruff check src

  unit-tests:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        working-directory: api
        run: uv sync --group dev
      - name: Run pytest
        working-directory: api
        run: uv run pytest

  api-tests:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build test images
        run: docker compose -p bibliocat-test -f docker-compose.test.yml up -d --build --wait
      - name: Run API tests
        run: apidog run ./tests/collection.apidog-cli.json -n 1 -r html,cli --out-dir ./apidog-reports/collection
             apidog run ./tests/auth.apidog-cli.json -n 1 -r html,cli --out-dir ./apidog-reports/auth
             apidog run ./tests/books.apidog-cli.json -n 1 -r html,cli --out-dir ./apidog-reports/books
             apidog run ./tests/authors.apidog-cli.json -n 1 -r html,cli --out-dir ./apidog-reports/authors
             apidog run ./tests/reading-logs.apidog-cli.json -n 1 -r html,cli --out-dir ./apidog-reports/reading-logs
  api-tests-teardown:
    if: always() && github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && github.ref == 'refs/heads/main'
    needs: api-tests
    runs-on: self-hosted
    steps:
      - name: Remove test volume
        run: docker compose -p bibliocat-test -f docker-compose.test.yml down -v

  build-api:
    if: (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && github.ref == 'refs/heads/main') || github.ref_type == 'tag'
    runs-on: self-hosted
    permissions:
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build API production image
        run: docker login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ghcr.io/${{ github.repository }}
             docker compose -f docker-compose.prod.yml build api
             docker compose -f docker-compose.prod.yml push api
  build-setup:
    if: (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && github.ref == 'refs/heads/main') || github.ref_type == 'tag'
    runs-on: self-hosted
    permissions:
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build setup production image
        run: docker login ghcr.io/${{ github.repository }} -u ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }}
             docker compose -f docker-compose.prod.yml build setup
             docker compose -f docker-compose.prod.yml push setup

  release:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Release
        uses: softprops/action-gh-release@v3

  deploy:
    if: github.event_name == 'release'
    runs-on: self-hosted
    steps:
      - name: Get images from the registry
        run: docker login ghcr.io/${{ github.repository }} -u ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }}
             docker compose -f docker-compose.prod.yml pull
      - name: Restart containers
        run: docker compose -f docker-compose.prod.yml up -d
