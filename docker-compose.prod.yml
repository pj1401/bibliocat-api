services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB_FILE: /run/secrets/db_name
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_name
      - db_user
      - db_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  setup:
    build:
      context: .
      dockerfile: setup/Dockerfile
    environment:
      POSTGRES_DB_FILE: /run/secrets/db_name
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CSV_PATH: data-subset/google-books-subset.csv
      CHUNK_SIZE: 5000
    secrets:
      - db_name
      - db_user
      - db_password
    depends_on:
      - db
    volumes:
      - ./setup/data:/app/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB_FILE: /run/secrets/db_name
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      FLASK_SECRET_KEY_FILE: /run/secrets/flask_secret_key
      JWT_PRIVATE_KEY_FILE: /run/secrets/jwt_private_key
      JWT_PUBLIC_KEY_FILE: /run/secrets/jwt_public_key
    secrets:
      - db_name
      - db_user
      - db_password
      - flask_secret_key
      - jwt_private_key
      - jwt_public_key
    depends_on:
      - db
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

secrets:
  db_name:
    external: true
  db_user:
    external: true
  db_password:
    external: true
  flask_secret_key:
    external: true
  jwt_private_key:
    external: true
  jwt_public_key:
    external: true

volumes:
  postgres_data:
